  /api/v1/coach:
    get:
      operationId: getCoach
      summary: 시군구 상태 기반 물관리 코치 문구 조회
      parameters:
        - name: sigunCode
          in: query
          required: true
          description: KRC 시군 코드 5자리
          schema:
            type: string
            pattern: "^[0-9]{5}$"
      responses:
        "200":
          description: >-
            검토 완료 행동 카탈로그 기반 코치 응답. LLM 폴백도 HTTP 200이며
            mode=static과 fallbackReason으로 관측한다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"
              examples:
                static:
                  value:
                    schemaVersion: "1"
                    mode: static
                    dataStale: false
                    cacheHit: false
                    generatedAt: "2026-07-21T00:00:00.000Z"
                    promptVersion: coach-v1
                    actionCatalogVersion: actions-v1
                    coach:
                      headline: 지금 할 일을 하나씩 확인해요.
                      summary: 예측은 참고 정보예요. 공식 가뭄 예·경보를 먼저 확인해요.
                      actions:
                        - id: care_save_paddy_water
                          title: 물꼬를 조금만 열어 두어요
                          reason: 논물을 아껴 쓰면 다음 단계까지 여유가 생겨요.
                        - id: care_check_official_notice
                          title: 공식 가뭄 안내를 확인해요
                          reason: 우리 지역 공식 예·경보가 가장 정확한 기준이에요.
                        - id: care_plan_water_order
                          title: 물 대는 순서를 정해요
                          reason: 필요한 논부터 차례로 물을 대면 부담이 줄어요.
                    fallbackReason: disabled
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 논가뭄지도
                    stale: false
        "400":
          description: sigunCode가 없거나 5자리 숫자가 아님 (retryable=false)
          content:
            application/json:
              schema:
