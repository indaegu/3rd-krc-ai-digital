openapi: 3.1.0
info:
  title: Mulsigye API
  version: 1.0.0
  description: 물시계 웹과 Android가 함께 소비하는 버전 고정 API 계약
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: 공개 API 프로세스 상태 확인
      responses:
        "200":
          description: API가 요청을 받을 수 있음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    service: mulsigye-api
                    status: ok
                    asOf: "2026-07-19T00:00:00.000Z"
                    sources: []
                    stale: false
        "503":
          description: API 프로세스가 요청을 처리할 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/regions/search:
    get:
      operationId: searchRegions
      summary: 주소 검색으로 지역 후보 목록 조회
      parameters:
        - name: q
          in: query
          required: true
          description: 사용자가 입력한 주소 검색어. 원문은 응답 후 폐기하며 저장하지 않는다.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: 주소 후보 목록. 후보가 없으면 빈 배열
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionSearchResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    candidates:
                      - label: 전라남도 나주시 시청길 22 (송월동)
                        admCd: "1217010200"
                        legalCode: "4617010200"
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 도로명주소 API
                    stale: false
        "400":
          description: 검색어가 없거나 형식이 잘못됨 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 도로명주소 API를 사용할 수 없음 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/regions/resolve:
    post:
      operationId: resolveRegion
      summary: 선택한 주소를 시군구와 우리 지역 대표 저수지로 확정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegionResolveRequest"
      responses:
        "200":
          description: >-
            시군구·대표 저수지 결정 결과. 후보가 없는 지역은 prepared=false로
            HTTP 200을 유지한다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionResolveResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    sigunCode: "44230"
                    sigunName: 논산시
                    prepared: true
                    reservoir:
                      facCode: "4423010045"
                      name: 탑정
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농업기반시설 시설제원_저수지
                    stale: false
                notReady:
                  value:
                    schemaVersion: "1"
                    sigunCode: "27260"
                    sigunName: null
                    prepared: false
                    reservoir: null
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농업기반시설 시설제원_저수지
                    stale: false
        "400":
          description: admCd·legalCode가 없거나 형식이 잘못됨 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 조회 저장소와 커밋 스냅샷 폴백까지 모두 실패함 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/status:
    get:
      operationId: getStatus
      summary: 시군구의 대표 저수지 현재값과 공식 가뭄단계 조회
      parameters:
        - name: sigunCode
          in: query
          required: true
          description: KRC 시군 코드 5자리
          schema:
            type: string
            pattern: "^[0-9]{5}$"
      responses:
        "200":
          description: >-
            대표 저수지 관측값과 지역 공식 단계. 수위 API 장애 시에도
            Supabase·커밋 스냅샷 폴백으로 stale=true HTTP 200을 유지한다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    sigunCode: "44230"
                    sigunName: 논산시
                    reservoir:
                      facCode: "4423010045"
                      name: 탑정
                      rate: 87.5
                      waterLevel: 32.1
                      observedOn: "2026-07-20"
                    region:
                      observedOn: "2026-07-20"
                      regionalRate: 82.4
                      normalRate: 88.1
                      avgRatio: 93.5
                      officialStage:
                        code: ok
                        label: 정상
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농촌용수 저수지 수위정보 조회
                      - 논가뭄지도
                    stale: false
                stale:
                  value:
                    schemaVersion: "1"
                    sigunCode: "46170"
                    sigunName: 나주시
                    reservoir:
                      facCode: "4617010001"
                      name: 나주
                      rate: null
                      waterLevel: null
                      observedOn: null
                    region:
                      observedOn: "2026-07-14"
                      regionalRate: 91.2
                      normalRate: 65.1
                      avgRatio: 140.1
                      officialStage:
                        code: ok
                        label: 정상
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - Supabase 스냅샷
                      - 논가뭄지도
                    stale: true
        "400":
          description: sigunCode가 없거나 5자리 숫자가 아님 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 준비되지 않은 시군구 코드 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 수위 API·Supabase·커밋 스냅샷 폴백이 모두 실패함 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - service
        - status
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        service:
          type: string
          const: mulsigye-api
        status:
          type: string
          const: ok
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
    RegionCandidate:
      type: object
      additionalProperties: false
      required:
        - label
        - admCd
        - legalCode
      properties:
        label:
          type: string
          minLength: 1
          description: 표시용 도로명주소. 선택 후 폐기하며 서버에 저장하지 않는다
        admCd:
          type: string
          pattern: "^[0-9]{10}$"
          description: 행정구역코드 10자리
        legalCode:
          type: string
          pattern: "^[0-9]{10}$"
          description: bdMgtSn 앞 10자리 법정동코드. admCd가 KRC 시군코드와 불일치할 때 폴백
    RegionSearchResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - candidates
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/RegionCandidate"
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    RegionResolveRequest:
      type: object
      additionalProperties: false
      required:
        - admCd
        - legalCode
      properties:
        admCd:
          type: string
          pattern: "^[0-9]{10}$"
        legalCode:
          type: string
          pattern: "^[0-9]{10}$"
    RepresentativeReservoir:
      type: object
      additionalProperties: false
      description: 우리 지역 대표 저수지. 거리 필드는 두지 않는다
      required:
        - facCode
        - name
      properties:
        facCode:
          type: string
          pattern: "^[0-9]{10}$"
          description: KRC 시설코드 10자리. 앞 5자리가 시군코드
        name:
          type: string
          minLength: 1
    RegionResolveResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - sigunCode
        - sigunName
        - prepared
        - reservoir
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        sigunCode:
          type:
            - string
            - "null"
          description: KRC 시군 코드 5자리. 판정 불가면 null
        sigunName:
          type:
            - string
            - "null"
        prepared:
          type: boolean
          description: false면 "이 지역은 준비 중이에요"를 표시한다
        reservoir:
          oneOf:
            - $ref: "#/components/schemas/RepresentativeReservoir"
            - type: "null"
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    DroughtStage:
      type: object
      additionalProperties: false
      description: 공식 가뭄단계. code는 UI 토큰, label은 한국어 공식 명칭
      required:
        - code
        - label
      properties:
        code:
          type: string
          enum:
            - ok
            - watch
            - care
            - alert
            - crit
        label:
          type: string
          enum:
            - 정상
            - 관심
            - 주의
            - 경계
            - 심각
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - sigunCode
        - sigunName
        - reservoir
        - region
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        sigunCode:
          type: string
          pattern: "^[0-9]{5}$"
        sigunName:
          type: string
        reservoir:
          type: object
          additionalProperties: false
          description: 우리 지역 대표 저수지의 최신 관측값
          required:
            - facCode
            - name
            - rate
            - waterLevel
            - observedOn
          properties:
            facCode:
              type: string
              pattern: "^[0-9]{10}$"
            name:
              type: string
              minLength: 1
            rate:
              type:
                - number
                - "null"
              minimum: 0
              description: 원저수율 %. 100 초과 가능. avgRatio와 섞지 않는다
            waterLevel:
              type:
                - number
                - "null"
              description: 수위(m)
            observedOn:
              type:
                - string
                - "null"
              format: date
              description: KST 달력일 YYYY-MM-DD
        region:
          type: object
          additionalProperties: false
          description: 논가뭄지도 기준 지역 공식 값
          required:
            - observedOn
            - regionalRate
            - normalRate
            - avgRatio
            - officialStage
          properties:
            observedOn:
              type: string
              format: date
              description: KST 달력일 YYYY-MM-DD
            regionalRate:
              type:
                - number
                - "null"
              minimum: 0
              description: 시군 통합 저수율 %
            normalRate:
              type:
                - number
                - "null"
              minimum: 0
              description: 평년 저수율 %
            avgRatio:
              type: number
              minimum: 0
              description: 평년 대비 저수율 %. 100 초과 가능(실측 140.1). 일일 변화량은 %p
            officialStage:
              $ref: "#/components/schemas/DroughtStage"
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
