openapi: 3.1.0
info:
  title: Mulsigye API
  version: 1.0.0
  description: 물시계 웹과 Android가 함께 소비하는 버전 고정 API 계약
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: 공개 API 프로세스 상태 확인
      responses:
        "200":
          description: API가 요청을 받을 수 있음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    service: mulsigye-api
                    status: ok
                    asOf: "2026-07-19T00:00:00.000Z"
                    sources: []
                    stale: false
        "503":
          description: API 프로세스가 요청을 처리할 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/regions/search:
    get:
      operationId: searchRegions
      summary: 주소 검색으로 지역 후보 목록 조회
      parameters:
        - name: q
          in: query
          required: true
          description: 사용자가 입력한 주소 검색어. 원문은 응답 후 폐기하며 저장하지 않는다.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: 주소 후보 목록. 후보가 없으면 빈 배열
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionSearchResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    candidates:
                      - label: 전라남도 나주시 시청길 22 (송월동)
                        admCd: "1217010200"
                        legalCode: "4617010200"
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 도로명주소 API
                    stale: false
        "400":
          description: 검색어가 없거나 형식이 잘못됨 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 도로명주소 API를 사용할 수 없음 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/regions/resolve:
    post:
      operationId: resolveRegion
      summary: 선택한 주소를 시군구와 우리 지역 대표 저수지로 확정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegionResolveRequest"
      responses:
        "200":
          description: >-
            시군구·대표 저수지 결정 결과. 후보가 없는 지역은 prepared=false로
            HTTP 200을 유지한다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionResolveResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    sigunCode: "44230"
                    sigunName: 논산시
                    prepared: true
                    reservoir:
                      facCode: "4423010045"
                      name: 탑정
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농업기반시설 시설제원_저수지
                    stale: false
                notReady:
                  value:
                    schemaVersion: "1"
                    sigunCode: "27260"
                    sigunName: null
                    prepared: false
                    reservoir: null
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농업기반시설 시설제원_저수지
                    stale: false
        "400":
          description: admCd·legalCode가 없거나 형식이 잘못됨 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 조회 저장소와 커밋 스냅샷 폴백까지 모두 실패함 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/status:
    get:
      operationId: getStatus
      summary: 시군구의 대표 저수지 현재값과 공식 가뭄단계 조회
      parameters:
        - name: sigunCode
          in: query
          required: true
          description: KRC 시군 코드 5자리
          schema:
            type: string
            pattern: "^[0-9]{5}$"
      responses:
        "200":
          description: >-
            대표 저수지 관측값과 지역 공식 단계. 수위 API 장애 시에도
            Supabase·커밋 스냅샷 폴백으로 stale=true HTTP 200을 유지한다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value:
                    schemaVersion: "1"
                    sigunCode: "44230"
                    sigunName: 논산시
                    reservoir:
                      facCode: "4423010045"
                      name: 탑정
                      rate: 87.5
                      waterLevel: 32.1
                      observedOn: "2026-07-20"
                    region:
                      observedOn: "2026-07-20"
                      regionalRate: 82.4
                      normalRate: 88.1
                      avgRatio: 93.5
                      officialStage:
                        code: ok
                        label: 정상
                    highWaterNotice: false
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - 농촌용수 저수지 수위정보 조회
                      - 논가뭄지도
                    stale: false
                stale:
                  value:
                    schemaVersion: "1"
                    sigunCode: "46170"
                    sigunName: 나주시
                    reservoir:
                      facCode: "4617010001"
                      name: 나주
                      rate: null
                      waterLevel: null
                      observedOn: null
                    region:
                      observedOn: "2026-07-14"
                      regionalRate: 91.2
                      normalRate: 65.1
                      avgRatio: 140.1
                      officialStage:
                        code: ok
                        label: 정상
                    highWaterNotice: false
                    asOf: "2026-07-21T00:00:00.000Z"
                    sources:
                      - Supabase 스냅샷
                      - 논가뭄지도
                    stale: true
        "400":
          description: sigunCode가 없거나 5자리 숫자가 아님 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 준비되지 않은 시군구 코드 (retryable=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 수위 API·Supabase·커밋 스냅샷 폴백이 모두 실패함 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
