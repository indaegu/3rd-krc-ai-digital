          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: 상태·예측 조회와 커밋 스냅샷 폴백이 모두 실패함 (retryable=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - service
        - status
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        service:
          type: string
          const: mulsigye-api
        status:
          type: string
          const: ok
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
    RegionCandidate:
      type: object
      additionalProperties: false
      required:
        - label
        - admCd
        - legalCode
      properties:
        label:
          type: string
          minLength: 1
          description: 표시용 도로명주소. 선택 후 폐기하며 서버에 저장하지 않는다
        admCd:
          type: string
          pattern: "^[0-9]{10}$"
          description: 행정구역코드 10자리
        legalCode:
          type: string
          pattern: "^[0-9]{10}$"
          description: bdMgtSn 앞 10자리 법정동코드. admCd가 KRC 시군코드와 불일치할 때 폴백
    RegionSearchResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - candidates
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/RegionCandidate"
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    RegionResolveRequest:
      type: object
      additionalProperties: false
      required:
        - admCd
        - legalCode
      properties:
        admCd:
          type: string
          pattern: "^[0-9]{10}$"
        legalCode:
          type: string
          pattern: "^[0-9]{10}$"
    RepresentativeReservoir:
      type: object
      additionalProperties: false
      description: 우리 지역 대표 저수지. 거리 필드는 두지 않는다
      required:
        - facCode
        - name
      properties:
        facCode:
          type: string
          pattern: "^[0-9]{10}$"
          description: KRC 시설코드 10자리. 앞 5자리가 시군코드
        name:
          type: string
          minLength: 1
    RegionResolveResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - sigunCode
        - sigunName
        - prepared
        - reservoir
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        sigunCode:
          type:
            - string
            - "null"
          description: KRC 시군 코드 5자리. 판정 불가면 null
        sigunName:
          type:
            - string
            - "null"
        prepared:
          type: boolean
          description: false면 "이 지역은 준비 중이에요"를 표시한다
        reservoir:
          oneOf:
            - $ref: "#/components/schemas/RepresentativeReservoir"
            - type: "null"
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    DroughtStage:
      type: object
      additionalProperties: false
      description: 공식 가뭄단계. code는 UI 토큰, label은 한국어 공식 명칭
      required:
        - code
        - label
      properties:
        code:
          type: string
          enum:
            - ok
            - watch
            - care
            - alert
            - crit
        label:
          type: string
          enum:
            - 정상
            - 관심
            - 주의
            - 경계
            - 심각
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - sigunCode
        - sigunName
        - reservoir
        - region
        - highWaterNotice
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        sigunCode:
          type: string
          pattern: "^[0-9]{5}$"
        sigunName:
          type: string
        reservoir:
          type: object
          additionalProperties: false
          description: 우리 지역 대표 저수지의 최신 관측값
          required:
            - facCode
            - name
            - rate
            - waterLevel
            - observedOn
          properties:
            facCode:
              type: string
              pattern: "^[0-9]{10}$"
            name:
              type: string
              minLength: 1
            rate:
              type:
                - number
                - "null"
              minimum: 0
              description: 원저수율 %. 100 초과 가능. avgRatio와 섞지 않는다
            waterLevel:
              type:
                - number
                - "null"
              description: 수위(m)
            observedOn:
              type:
                - string
                - "null"
              format: date
              description: KST 달력일 YYYY-MM-DD
        region:
          type: object
          additionalProperties: false
          description: 논가뭄지도 기준 지역 공식 값
          required:
            - observedOn
            - regionalRate
            - normalRate
            - avgRatio
            - officialStage
          properties:
            observedOn:
              type: string
              format: date
              description: KST 달력일 YYYY-MM-DD
            regionalRate:
              type:
                - number
                - "null"
              minimum: 0
              description: 시군 통합 저수율 %
            normalRate:
              type:
                - number
                - "null"
              minimum: 0
              description: 평년 저수율 %
            avgRatio:
              type: number
              minimum: 0
              description: 평년 대비 저수율 %. 100 초과 가능(실측 140.1). 일일 변화량은 %p
            officialStage:
              $ref: "#/components/schemas/DroughtStage"
        highWaterNotice:
          type: boolean
          description: >-
            만수위 '참고' 안내 여부. 대표 저수지 원저수율 95% 이상 + 상승 추세일
            때만 true이며 서버가 확정한다. 클라이언트는 이 값을 재판정하지
            않는다(자체 임계값 복제 금지). 경보가 아니라 참고 표시 전용이다
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    ForecastPoint:
      type: object
      additionalProperties: false
      description: 실측 avgRatio 시계열 점
      required:
        - observedOn
        - avgRatio
      properties:
        observedOn:
          type: string
          format: date
          description: KST 달력일 YYYY-MM-DD
        avgRatio:
          type: number
          minimum: 0
          description: 평년 대비 저수율 %. 100 초과 가능
    ForecastBandPoint:
      type: object
      additionalProperties: false
      description: 14일 예측 점과 불확실성 밴드. 밴드 산식은 model.bandMethod가 정의
      required:
        - observedOn
        - avgRatio
        - low
        - high
      properties:
        observedOn:
          type: string
          format: date
          description: KST 달력일 YYYY-MM-DD
        avgRatio:
          type: number
          minimum: 0
          description: 채택 모델의 예측 avgRatio %
        low:
          type: number
          description: 밴드 하한 %p 반영값
        high:
          type: number
          description: 밴드 상한 %p 반영값
    ForecastResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - sigunCode
        - sigunName
        - basis
        - history
        - forecast
        - trend
        - reach
        - model
        - officialOutlook
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        sigunCode:
          type: string
          pattern: "^[0-9]{5}$"
        sigunName:
          type: string
        basis:
          type: object
          additionalProperties: false
          description: 최신 실측 기준점
          required:
            - observedOn
            - avgRatio
            - officialStage
          properties:
            observedOn:
              type: string
              format: date
              description: KST 달력일 YYYY-MM-DD
            avgRatio:
              type: number
              minimum: 0
              description: 평년 대비 저수율 %. 100 초과 가능
            officialStage:
              $ref: "#/components/schemas/DroughtStage"
        history:
          type: array
          description: 최근 30일 실측(실선)
          items:
            $ref: "#/components/schemas/ForecastPoint"
        forecast:
          type: array
          description: 14일 예측(점선)과 밴드
          items:
            $ref: "#/components/schemas/ForecastBandPoint"
        trend:
          type: object
          additionalProperties: false
          required:
            - dailyDelta
            - bucket
          properties:
            dailyDelta:
              type: number
              description: >-
                일일 변화량 %p/day. 최근 14일 실측 avgRatio의 관측 선형 기울기
                (observedDailyDelta)로 계산한다. 예측선·밴드는 채택 모델과 잔차
                분위수 기반이며 추세·도달일과 근거를 분리한다
            bucket:
              type: string
              enum:
                - rising
                - stable
                - falling
              description: "|dailyDelta| < 0.05 %p/day면 stable"
        reach:
          type: object
          additionalProperties: false
          description: 다음 공인 단계 도달 가능 시점. 참고 표현 전용
          required:
            - days
            - bucket
            - targetStage
          properties:
            days:
              type:
                - number
                - "null"
              minimum: 1
              maximum: 30
              description: 1~30일만 숫자로 표시. 그 외(안정)는 null
            bucket:
              type: string
              enum:
                - none
                - within_7d
                - within_14d
                - within_30d
            targetStage:
              oneOf:
                - $ref: "#/components/schemas/DroughtStage"
                - type: "null"
              description: 도달 대상 다음 단계. 계산하지 않으면 null(심각 단계 포함)
        model:
          type: object
          additionalProperties: false
          description: 백테스트로 채택한 예측 모델 메타데이터 (data/backtest-report.json)
          required:
            - name
            - version
            - mae7
            - mae14
            - bandMethod
          properties:
            name:
              type: string
              enum:
                - naive
                - ma7
                - linear
                - ses
            version:
              type: string
              minLength: 1
              description: 예측 상수를 포함한 모델 버전. 예 pred-v1
            mae7:
              type: number
              minimum: 0
              description: 백테스트 7일 macro MAE %p
            mae14:
              type: number
              minimum: 0
              description: 백테스트 14일 macro MAE %p
            bandMethod:
              type: string
              enum:
                - residual_quantile_p10_p90
                - recent_mae
              description: 밴드 산식. 잔차 충분 시 경험적 10~90 분위수, 부족 시 최근 14일 MAE
        officialOutlook:
          oneOf:
            - type: object
              additionalProperties: false
              required:
                - publishedOn
                - current
                - outlook1m
                - outlook2m
                - outlook3m
              properties:
                publishedOn:
                  type: string
                  format: date
                  description: 공식 전망 발행일 YYYY-MM-DD
                current:
                  $ref: "#/components/schemas/DroughtStage"
                outlook1m:
                  $ref: "#/components/schemas/DroughtStage"
                outlook2m:
                  $ref: "#/components/schemas/DroughtStage"
                outlook3m:
                  $ref: "#/components/schemas/DroughtStage"
            - type: "null"
          description: 공식 가뭄예경보 전망 병기. 최신 발행분이 없으면 null
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
    CoachResponse:
      type: object
      additionalProperties: false
      description: >-
        물관리 코치 응답. LLM 폴백도 HTTP 200이며 mode로 관측한다. 클라이언트는
        mode에 따라 화면 구조를 바꾸지 않는다
      required:
        - schemaVersion
        - mode
        - dataStale
        - cacheHit
        - generatedAt
        - promptVersion
        - actionCatalogVersion
        - coach
        - fallbackReason
        - asOf
        - sources
        - stale
      properties:
        schemaVersion:
          type: string
          const: "1"
        mode:
          type: string
          enum:
            - llm
            - cache
            - static
          description: 코치 문구 출처
        dataStale:
          type: boolean
          description: KRC 데이터의 오래됨. 코치 캐시 여부와 구분한다
        cacheHit:
          type: boolean
        generatedAt:
          type: string
          format: date-time
        promptVersion:
          type: string
          minLength: 1
          description: 예 coach-v1
        actionCatalogVersion:
          type: string
          minLength: 1
          description: 예 actions-v1
        coach:
          type: object
          additionalProperties: false
          required:
            - headline
            - summary
            - actions
          properties:
            headline:
              type: string
              minLength: 1
              maxLength: 30
              description: 한 문장, ~해요체
            summary:
              type: string
              minLength: 1
              maxLength: 100
              description: 최대 두 문장, 숫자를 추가하지 않는 쉬운 요약
            actions:
              type: array
              minItems: 1
              maxItems: 3
              items:
                type: object
                additionalProperties: false
                required:
                  - id
                  - title
                  - reason
                properties:
                  id:
                    type: string
                    minLength: 1
                    description: 행동 카탈로그 ID
                  title:
                    type: string
                    minLength: 1
                    maxLength: 30
                    description: 항상 서버 행동 카탈로그에서 결합한 검토 완료 문구
                  reason:
                    type: string
                    minLength: 1
                    maxLength: 70
                    description: 한 문장, ~해요체
        fallbackReason:
          type:
            - string
            - "null"
          enum:
            - disabled
            - cache_unavailable
            - budget_exceeded
            - daily_limit
            - generation_in_progress
            - timeout
            - rate_limited
            - provider_error
            - refusal
            - max_tokens
            - validation_failed
            - null
          description: 정적 폴백 사유. LLM 정상 생성이면 null
        asOf:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        stale:
          type: boolean
